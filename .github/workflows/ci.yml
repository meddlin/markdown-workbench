name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: npm run package

    # NOTE: Uploads the VSIX artifact to allow for manual testing before 
    # cutting a new release
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-reflow-vsix
          path: "*.vsix"