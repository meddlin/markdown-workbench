name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: coverage
        continue-on-error: true
        run: npm run test:coverage

      - name: Comment coverage report on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && always()
        env:
          COVERAGE_OUTCOME: ${{ steps.coverage.outcome }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const fs = require('node:fs')

          const marker = '<!-- markdown-reflow-coverage-report -->'
          const summaryPath = 'coverage/coverage-summary.json'
          const outcome = process.env.COVERAGE_OUTCOME
          const runUrl = process.env.RUN_URL
          const status = outcome === 'success' ? 'passed' : 'failed'

          let body = `${marker}\n## Unit Test Coverage\n\n`
          body += `Coverage run ${status}. [View workflow run](${runUrl}).\n`

          if (fs.existsSync(summaryPath)) {
            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8')).total
            const metrics = [
              ['Statements', summary.statements],
              ['Branches', summary.branches],
              ['Functions', summary.functions],
              ['Lines', summary.lines],
            ]

            body += '\n| Metric | Covered | Total | Percent |\n'
            body += '| --- | ---: | ---: | ---: |\n'

            for (const [label, metric] of metrics) {
              body += `| ${label} | ${metric.covered} | ${metric.total} | ${metric.pct.toFixed(2)}% |\n`
            }
          } else {
            body += '\nCoverage summary was not generated. Check the workflow logs for the unit test or coverage failure.\n'
          }

          fs.writeFileSync('coverage-comment.json', `${JSON.stringify({ body })}\n`)
          NODE

          comment_id="$(
            gh api "repos/$REPOSITORY/issues/$PR_NUMBER/comments" \
              --jq '.[] | select(.body | contains("<!-- markdown-reflow-coverage-report -->")) | .id' \
              | head -n 1
          )"

          if [ -n "$comment_id" ]; then
            gh api --method PATCH "repos/$REPOSITORY/issues/comments/$comment_id" --input coverage-comment.json
          else
            gh api --method POST "repos/$REPOSITORY/issues/$PR_NUMBER/comments" --input coverage-comment.json
          fi

      - name: Fail when tests or coverage fail
        if: steps.coverage.outcome != 'success'
        run: exit 1

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: npm run package

      # NOTE: Uploads the VSIX artifact to allow for manual testing before
      # cutting a new release
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: markdown-reflow-vsix
          path: "*.vsix"
